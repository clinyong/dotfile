# 适合 SSH 与频繁分屏的 tmux 基础配置。

# 窗口/窗格从 1 开始编号，并在关闭窗口后自动重新编号。
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 保留更多终端历史；允许使用鼠标切换窗格、滚动和调整大小。
set -g history-limit 50000
set -g mouse on

# 让 tmux 传递带修饰键的按键（如 Ctrl/Alt/Shift + Enter），并使用 CSI-u 格式以兼容 Pi。
set -g extended-keys on
set -g extended-keys-format csi-u

# 使用 Vim 风格按键进行复制：Prefix + [ 后，v 开始选择，y 复制并退出。
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 复制时通过 OSC 52 尝试同步到连接 tmux 的终端系统剪贴板（如 Ghostty）。
set -s set-clipboard on

# 新建窗口或分屏时继承当前目录。
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Prefix + h/j/k/l 切换窗格；Prefix + H/J/K/L 连续调整窗格大小。
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Prefix + r 重新加载配置。
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# 与 vim-tmux-navigator 配合：无需 Prefix，用 Ctrl-h/j/k/l 在 Neovim 分屏和 tmux 窗格间移动。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# 在 tmux 复制模式中也允许用 Ctrl-h/j/k/l 切换到相邻窗格。
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi C-\\ select-pane -l
